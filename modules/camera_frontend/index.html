<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; background:transparent; font-family: sans-serif; }
  #video { width:100%; max-height:340px; object-fit:cover; border-radius:8px; background:#000; display:block; }
  #status { font-size:0.75rem; color:#888; padding:4px 0; }
</style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="status">Kamera wird initialisiert...</div>
  <canvas id="canvas" style="display:none;"></canvas>
<script>
(function () {
    const videoEl = document.getElementById('video');
    const canvasEl = document.getElementById('canvas');
    const statusEl = document.getElementById('status');

    let currentStream = null;
    let currentDeviceId = null;
    let lastPreferredLabel; // undefined beim ersten Lauf
    let lastProcessedToken = null;
    let deviceList = [];

    function setStatus(msg) { statusEl.textContent = msg; }

    function sendValue(photoBase64) {
        window.parent.postMessage({
            isStreamlitMessage: true,
            type: 'streamlit:setComponentValue',
            value: { devices: deviceList, photo_base64: photoBase64 },
            dataType: 'json'
        }, '*');
    }

    function setFrameHeight() {
        window.parent.postMessage({
            isStreamlitMessage: true,
            type: 'streamlit:setFrameHeight',
            height: 380
        }, '*');
    }

    async function refreshDeviceList() {
        try {
            const all = await navigator.mediaDevices.enumerateDevices();
            deviceList = all
                .filter(function (d) { return d.kind === 'videoinput'; })
                .map(function (d) { return { deviceId: d.deviceId, label: d.label || '' }; });
        } catch (e) {
            deviceList = [];
        }
    }

    function pickDeviceId(preferredLabel) {
        if (!deviceList.length) return null;
        if (preferredLabel) {
            const match = deviceList.find(function (d) {
                return d.label && d.label.toLowerCase().indexOf(preferredLabel.toLowerCase()) !== -1;
            });
            if (match) return match.deviceId;
        }
        return deviceList[0].deviceId;
    }

    async function openStream(deviceId) {
        if (currentStream) {
            currentStream.getTracks().forEach(function (t) { t.stop(); });
            currentStream = null;
        }
        const constraints = deviceId
            ? { video: { deviceId: { exact: deviceId } }, audio: false }
            : { video: { facingMode: 'environment' }, audio: false };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoEl.srcObject = currentStream;
            currentDeviceId = deviceId;
            setStatus('Kamera aktiv.');
            await refreshDeviceList(); // Geräte-Labels sind erst nach Erlaubnis sichtbar
            sendValue(null);
        } catch (e) {
            setStatus('Kamera-Fehler: ' + e.message);
        }
    }

    function capturePhoto() {
        const w = videoEl.videoWidth;
        const h = videoEl.videoHeight;
        if (!w || !h) {
            setStatus('Video noch nicht bereit, Aufnahme übersprungen.');
            return;
        }
        canvasEl.width = w;
        canvasEl.height = h;
        canvasEl.getContext('2d').drawImage(videoEl, 0, 0, w, h);
        const dataUrl = canvasEl.toDataURL('image/jpeg', 0.85);
        const base64 = dataUrl.split(',')[1];
        setStatus('📸 Foto aufgenommen!');
        sendValue(base64);
    }

    async function handleRender(args) {
        const preferredLabel = args.preferred_label || null;
        const triggerToken = args.trigger_token || '';

        if (!currentStream) {
            await refreshDeviceList();
            const deviceId = pickDeviceId(preferredLabel);
            await openStream(deviceId);
        } else if (preferredLabel !== lastPreferredLabel) {
            const deviceId = pickDeviceId(preferredLabel);
            if (deviceId !== currentDeviceId) {
                await openStream(deviceId);
            }
        }
        lastPreferredLabel = preferredLabel;

        if (triggerToken && triggerToken !== 'none' && triggerToken !== lastProcessedToken) {
            lastProcessedToken = triggerToken;
            capturePhoto();
        }
    }

    window.addEventListener('message', function (event) {
        const data = event.data;
        if (!data || data.type !== 'streamlit:render') return;
        handleRender(data.args || {});
    });

    window.parent.postMessage({ isStreamlitMessage: true, type: 'streamlit:componentReady', apiVersion: 1 }, '*');
    setFrameHeight();
})();
</script>
</body>
</html>
