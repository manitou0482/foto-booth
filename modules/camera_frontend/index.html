<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; background:transparent; font-family: sans-serif; }
  #video { width:100%; max-height:380px; object-fit:cover; border-radius:20px; background:#000; display:block; }
  #status { font-size:0.75rem; color:#9b8aa8; padding:6px 0; text-align:center; }
  #manualBtn {
    display:block; width:100%; margin-top:8px; padding:12px; border:none;
    border-radius:28px; background:#D4B05A; color:#2A1538; font-weight:700;
    font-size:1rem; cursor:pointer;
  }
</style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="status">Kamera wird initialisiert...</div>
  <button id="manualBtn">📸 Jetzt aufnehmen</button>
  <canvas id="canvas" style="display:none;"></canvas>
<script>
(function () {
    const videoEl = document.getElementById('video');
    const canvasEl = document.getElementById('canvas');
    const statusEl = document.getElementById('status');
    const manualBtn = document.getElementById('manualBtn');

    let currentStream = null;
    let lastProcessedToken = null;
    let captured = false;

    function setStatus(msg) { statusEl.textContent = msg; }

    function sendValue(photoBase64) {
        window.parent.postMessage({
            isStreamlitMessage: true,
            type: 'streamlit:setComponentValue',
            value: photoBase64,
            dataType: 'json'
        }, '*');
    }

    function setFrameHeight() {
        window.parent.postMessage({
            isStreamlitMessage: true,
            type: 'streamlit:setFrameHeight',
            height: 460
        }, '*');
    }

    async function openStream() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false,
            });
            videoEl.srcObject = currentStream;
            setStatus('Kamera aktiv.');
        } catch (e) {
            setStatus('Kamera-Fehler: ' + e.message);
        }
    }

    function waitForVideoReady(maxAttempts) {
        return new Promise(function (resolve) {
            let attempts = 0;
            (function check() {
                attempts++;
                if (videoEl.videoWidth && videoEl.videoHeight) {
                    resolve(true);
                } else if (attempts >= maxAttempts) {
                    resolve(false);
                } else {
                    setTimeout(check, 100);
                }
            })();
        });
    }

    function capturePhoto() {
        if (captured) return;
        const w = videoEl.videoWidth;
        const h = videoEl.videoHeight;
        if (!w || !h) {
            setStatus('Video noch nicht bereit - bitte "Jetzt aufnehmen" antippen.');
            return;
        }
        captured = true;
        canvasEl.width = w;
        canvasEl.height = h;
        canvasEl.getContext('2d').drawImage(videoEl, 0, 0, w, h);
        const dataUrl = canvasEl.toDataURL('image/jpeg', 0.85);
        const base64 = dataUrl.split(',')[1];
        setStatus('📸 Foto aufgenommen!');
        sendValue(base64);
    }

    manualBtn.addEventListener('click', function () {
        capturePhoto();
    });

    async function handleRender(args) {
        const triggerToken = args.trigger_token || '';

        if (!currentStream) {
            await openStream();
        }

        if (triggerToken && triggerToken !== 'none' && triggerToken !== lastProcessedToken) {
            lastProcessedToken = triggerToken;
            captured = false;
            const ready = await waitForVideoReady(50); // bis zu ca. 5s warten
            if (ready) {
                capturePhoto();
            } else {
                setStatus('Kamera nicht rechtzeitig bereit - bitte "Jetzt aufnehmen" antippen.');
            }
        }
    }

    window.addEventListener('message', function (event) {
        const data = event.data;
        if (!data || data.type !== 'streamlit:render') return;
        handleRender(data.args || {});
    });

    window.parent.postMessage({ isStreamlitMessage: true, type: 'streamlit:componentReady', apiVersion: 1 }, '*');
    setFrameHeight();
})();
</script>
</body>
</html>
